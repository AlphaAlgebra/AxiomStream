global:
  scrape_interval: 1s          # Precision sampling rate
  evaluation_interval: 1s      # Alerting rule calculation interval
  scrape_timeout: 1s           # Drop slow scrapers instantly to prevent state drift

scrape_configs:
  - job_name: 'axiomstream-mesh'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          environment: 'production'
          cluster_region: 'us-east-1'
          compliance_zone: 'fedramp'

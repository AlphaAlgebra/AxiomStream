name: AxiomStream Core CI Pipeline

# Trigger the workflow on every push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out your repository code onto the runner machine
      - name: Check out Repository Layers
        uses: actions/checkout@v4

      # Step 2: Set up a dedicated Python 3.11 environment runtime
      - name: Initialize Python 3.11 Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Automatically caches your dependencies to optimize run times

      # Step 3: Install system-level Kafka dependencies needed to compile confluent-kafka
      - name: Install System Dependencies (librdkafka)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librdkafka-dev

      # Step 4: Install your exact project packages
      - name: Ingest Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest # Ensures pytest is explicitly available to the runner

      # Step 5: Execute your automated PyTest testing layout matrix
      - name: Execute Quality Assertion Suites
        # Setting PYTHONPATH ensures the worker node maps your inner 'src' package paths accurately
        env:
          PYTHONPATH: .
        run: |
          pytest -v

name: Production Docker Engine Validation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest
    steps:
    - name: Fetch Codebase Token
      uses: actions/checkout@v4

    - name: Initialize Python Core Sandbox Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Run Quality Assertion Suite
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pytest -v

    - name: Build and Validate Multi-Stage Production Container
      run: |
        docker build -t axiom-stream-engine:${{ github.sha }} .
        echo "✨ Container build completed successfully."

name: Production Docker Engine Validation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Codebase Token Layers
        uses: actions/checkout@v4

      - name: Configure Production Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ingestion Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust

      - name: Run Quality Assertion Suite
        env:
          PYTHONPATH: .
        run: |
          python3 -m pytest -vv -p no:cacheprovider tests/test_symbolic_engine.py

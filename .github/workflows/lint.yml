name: AxiomStream Automated Code Quality & Linting Engine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code Layers
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Execute Black Code Auto-Formatter
        run: |
          black src/ tests/ locustfile.py

      - name: Verify PEP 8 Style Compliance via Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Commit Clean Formatted Code Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(infra): automated black formatting compliance pass"
          file_pattern: "*.py"

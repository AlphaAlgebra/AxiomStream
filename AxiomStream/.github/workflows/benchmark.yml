name: AxiomStream Automated Performance Benchmarking Engine

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# --- ELITE SENIOR MOVE: GRANT EXPLICIT WRITE PERMISSIONS TO WORKFLOW ENGINE RUNNERS ---
permissions:
  contents: write

jobs:
  performance-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Layers
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust

      - name: Execute Headless Locust Stress-Test Benchmark
        run: |
          locust -f locustfile.py --headless -u 50 -r 5 --run-time 20s --csv=benchmark_report

      - name: Generate and Format Architectural Efficiency Log
        run: |
          echo "=== 📊 REAL-TIME CORE INGESTION EFFICIENCY METRICS ===" > benchmark_efficiency.log
          echo "Timestamp: $(date -u)" >> benchmark_efficiency.log
          echo "--------------------------------------------------------" >> benchmark_efficiency.log
          if [ -f benchmark_report_stats.csv ]; then
            echo "Target Method | Total Requests | Total Failures | Median Latency (ms) | Average Latency (ms) | Max Latency (ms) | Avg Throughput (RPS)" >> benchmark_efficiency.log
            tail -n 1 benchmark_report_stats.csv | awk -F',' '{print $1 " | " $2 " | " $3 " | " $4 " | " $5 " | " $6 " | " $10}' >> benchmark_efficiency.log
            tail -n 1 benchmark_report_stats.csv | awk -F',' '{print $2}' > .total_reqs
            tail -n 1 benchmark_report_stats.csv | awk -F',' '{print $3}' > .total_fails
            tail -n 1 benchmark_report_stats.csv | awk -F',' '{print $10}' > .total_rps
          else
            echo "⚠️ Performance CSV reporting metrics compilation failed." >> benchmark_efficiency.log
          fi
          cat benchmark_efficiency.log

      - name: Commit Historic Telemetry Efficiency Logs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "perf(telemetry): update automated performance efficiency matrix records"
          file_pattern: "benchmark_efficiency.log"

      - name: Stream Real-Time Performance Alerts to Mobile Device
        if: always()
        run: |
          REQS=$(cat .total_reqs 2>/dev/null || echo "0")
          FAILS=$(cat .total_fails 2>/dev/null || echo "0")
          RPS=$(cat .total_rps 2>/dev/null || echo "0.0")
          JSON_PAYLOAD="{\"content\": \"🚀 **AxiomStream Cluster Load Test Complete**\\\n📊 **Throughput Velocity:** \`${RPS} RPS\`\\\n✅ **Processed Requests:** \`${REQS}\`\\\n❌ **Encountered Faults:** \`${FAILS}\`\\\n🔗 **Commit Matrix Ledger:** https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          if [ ! -z "${{ secrets.WEBHOOK_NOTIFICATION_URL }}" ]; then
            curl -H "Content-Type: application/json" -X POST -d "$JSON_PAYLOAD" "${{ secrets.WEBHOOK_NOTIFICATION_URL }}"
            echo "✨ Live metric alert pinged successfully to your mobile messaging device!"
          else
            echo "⚠️ WEBHOOK_NOTIFICATION_URL secret is missing. Skipping phone stream."
          fi

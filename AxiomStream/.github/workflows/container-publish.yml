name: AxiomStream Container Image Distribution Engine

on:
  release:
    types: [published] # Trigger autonomously when an official release tag is generated

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Critical permission required to write directly to GHCR
    steps:
      - name: Checkout Code Layers
        uses: actions/checkout@v4

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile and Ship Secure Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/axiomstream-engine:latest
            ghcr.io/${{ github.repository_owner }}/axiomstream-engine:${{ github.ref_name }}
